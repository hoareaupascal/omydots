[general]
	import = ["~/.config/alacritty/theme.toml"]

[font]
	size = 10

[font.normal]
	family = "JetBrainsMono Nerd Font"
	style = "Regular"

[selection]
  save_to_clipboard = true

[mouse]
  bindings = [
  { mouse = "Right", action = "Copy" },
  ]

[window]
	opacity = 0.94
	blur = true
	decorations = "none"
	startup_mode = "Maximized"
	dynamic_title = true
	padding = { x = 5, y = 5 }
