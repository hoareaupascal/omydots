[colors.primary]
background = "#0d0d0d"
foreground = "#ffffff"

[colors.cursor]
cursor = "#ffffff"

[colors.selection]
text = "#0d0d0d"       # selection_foreground
background = "#ffffff"  # selection_background

[colors.normal]
black   = "#0d0d0d"
red     = "#a4a4a4"
green   = "#b6b6b6"
yellow  = "#cecece"
blue    = "#8d8d8d"
magenta = "#9b9b9b"
cyan    = "#b0b0b0"
white   = "#ececec"

[colors.bright]
black   = "#fdfdfd"
red     = "#a4a4a4"
green   = "#b6b6b6"
yellow  = "#cecece"
blue    = "#8d8d8d"
magenta = "#9b9b9b"
cyan    = "#b0b0b0"
white   = "#ffffff"

# Optional: dim colors (most people don't use them, feel free to remove)
[colors.dim]
black   = "#0d0d0d"
red     = "#808080"
green   = "#909090"
yellow  = "#a0a0a0"
blue    = "#6d6d6d"
magenta = "#7b7b7b"
cyan    = "#909090"
white   = "#cccccc"